<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Library Management System{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">Library System</a>
     <div>
    <a class="btn btn-outline-light me-2" href="{% url 'home' %}">Home</a>
    <a class="btn btn-outline-light me-2" href="{% url 'book_list' %}">Books</a>
    <a class="btn btn-outline-light me-2" href="{% url 'student_list' %}">Students</a>
    <a class="btn btn-outline-light me-2" href="{% url 'borrow_list' %}">Borrowing</a>

   {% if user.is_authenticated %}
    <a class="btn btn-outline-light me-2" href="{% url 'my_books' %}">My Books</a>
    <span class="text-white me-2">Hello, {{ user.username }}</span>

    <form method="post" action="{% url 'logout' %}" style="display:inline;">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Logout</button>
    </form>
{% else %}
    <a class="btn btn-success me-2" href="{% url 'login' %}">Login</a>
{% endif %}

    <a class="btn btn-warning ms-2" href="/admin/">Admin</a>
</div>
    </div>
</nav>

<div class="container mt-4">

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-success alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endif %}

    {% block content %}
    {% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
