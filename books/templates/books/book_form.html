{% extends 'base.html' %}

{% block title %}Book Form{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">
                    {% if form.instance.id %}Edit Book{% else %}Add Book{% endif %}
                </h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-success">Save</button>
                    <a href="{% url 'book_list' %}" class="btn btn-secondary">Back</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
